<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinQuest – Gamified Financial Education</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg-base:#080c14;--bg-card:#0f1827;--bg-card2:#121f33;--bg-surface:#162035;--accent-green:#00e5a0;--accent-gold:#ffd94a;--accent-blue:#3b9eff;--accent-purple:#a259ff;--accent-coral:#ff6b6b;--text-primary:#e8f0fe;--text-secondary:#7b8fab;--text-muted:#4a5568;--border:rgba(59,158,255,0.15);--border-bright:rgba(0,229,160,0.3);--glow-green:0 0 20px rgba(0,229,160,0.3);--glow-gold:0 0 20px rgba(255,217,74,0.3);--glow-blue:0 0 20px rgba(59,158,255,0.3);--radius:16px;--radius-sm:10px;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--transition:all 0.25s cubic-bezier(0.4,0,0.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg-base);color:var(--text-primary);min-height:100vh;overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg-base)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.2}
h1{font-size:clamp(2rem,5vw,3.5rem)}h2{font-size:clamp(1.4rem,3vw,2rem)}h3{font-size:1.2rem}
p{color:var(--text-secondary)}
.gt{background:linear-gradient(135deg,var(--accent-green),var(--accent-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gold-text{background:linear-gradient(135deg,var(--accent-gold),#ffaa00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;transition:var(--transition)}
.card:hover{border-color:var(--border-bright)}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.5rem;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:var(--transition);letter-spacing:.02em}
.btn-p{background:linear-gradient(135deg,var(--accent-green),#00b87a);color:#000}
.btn-p:hover{transform:translateY(-2px);box-shadow:var(--glow-green)}
.btn-s{background:transparent;color:var(--accent-green);border:1px solid var(--accent-green)}
.btn-s:hover{background:rgba(0,229,160,.1)}
.btn-g{background:linear-gradient(135deg,var(--accent-gold),#ffaa00);color:#000}
.btn-g:hover{transform:translateY(-2px);box-shadow:var(--glow-gold)}
.btn-b{background:linear-gradient(135deg,var(--accent-blue),#0066cc);color:#fff}
.btn-b:hover{transform:translateY(-2px)}
.btn-r{background:linear-gradient(135deg,var(--accent-coral),#cc4444);color:#fff}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .8rem;border-radius:100px;font-size:.78rem;font-weight:600;font-family:var(--font-display)}
.bg{background:rgba(0,229,160,.15);color:var(--accent-green);border:1px solid rgba(0,229,160,.3)}
.bb{background:rgba(59,158,255,.15);color:var(--accent-blue);border:1px solid rgba(59,158,255,.3)}
.bgo{background:rgba(255,217,74,.15);color:var(--accent-gold);border:1px solid rgba(255,217,74,.3)}
.bp{background:rgba(162,89,255,.15);color:var(--accent-purple);border:1px solid rgba(162,89,255,.3)}
.bc{background:rgba(255,107,107,.15);color:var(--accent-coral);border:1px solid rgba(255,107,107,.3)}
.input{width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem;color:var(--text-primary);font-family:var(--font-body);font-size:.95rem;transition:var(--transition);outline:none}
.input:focus{border-color:var(--accent-green);box-shadow:0 0 0 3px rgba(0,229,160,.1)}
.input::placeholder{color:var(--text-muted)}
.label{display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:.4rem;letter-spacing:.05em;text-transform:uppercase}
.err{color:var(--accent-coral);font-size:.85rem;margin-top:.5rem}
/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;height:100vh;z-index:100;overflow-y:auto}
.main{margin-left:240px;flex:1;padding:2rem;min-height:100vh}
.nav-logo{font-family:var(--font-display);font-size:1.4rem;font-weight:800;margin-bottom:2rem;padding:.5rem}
.nav-links{display:flex;flex-direction:column;gap:.3rem;flex:1}
.nav-link{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:var(--radius-sm);color:var(--text-secondary);text-decoration:none;font-weight:500;transition:var(--transition);cursor:pointer;border:none;background:transparent;font-family:var(--font-body);font-size:.95rem;width:100%;text-align:left}
.nav-link:hover{background:var(--bg-surface);color:var(--text-primary)}
.nav-link.active{background:rgba(0,229,160,.1);color:var(--accent-green);border-left:3px solid var(--accent-green)}
.nav-bottom{margin-top:auto;border-top:1px solid var(--border);padding-top:1rem}
/* Landing */
.landing{min-height:100vh;display:flex;flex-direction:column;background:var(--bg-base);position:relative;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:float 8s ease-in-out infinite}
.o1{width:600px;height:600px;background:var(--accent-green);top:-200px;right:-100px}
.o2{width:400px;height:400px;background:var(--accent-blue);bottom:-100px;left:-100px;animation-delay:-4s}
.o3{width:300px;height:300px;background:var(--accent-purple);top:40%;left:30%;animation-delay:-2s}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}
.lnav{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 3rem;position:relative;z-index:1}
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 2rem;position:relative;z-index:1}
/* Auth */
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg-base);position:relative;overflow:hidden}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:calc(var(--radius)*1.5);padding:2.5rem;width:100%;max-width:440px;position:relative;z-index:1}
/* Progress */
.prog-wrap{background:var(--bg-surface);border-radius:100px;height:8px;overflow:hidden;margin-top:.5rem}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent-green),var(--accent-blue));transition:width .5s ease}
/* Game screens */
.game-hud{display:flex;justify-content:space-between;align-items:center;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1.5rem}
.hud-v{font-family:var(--font-display);font-size:1.3rem;font-weight:800;color:var(--accent-green)}
.hud-l{font-size:.72rem;color:var(--text-muted)}
.choice{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem;color:var(--text-primary);font-family:var(--font-body);font-size:.92rem;cursor:pointer;transition:var(--transition);text-align:left;display:flex;align-items:center;gap:.75rem;width:100%;margin-bottom:.6rem}
.choice:hover{border-color:var(--accent-blue);background:rgba(59,158,255,.08)}
.choice.correct{border-color:var(--accent-green)!important;background:rgba(0,229,160,.15)!important}
.choice.wrong{border-color:var(--accent-coral)!important;background:rgba(255,107,107,.15)!important}
.cletter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.feedback{background:var(--bg-card2);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-top:1rem;font-size:.9rem;line-height:1.6;border-left:3px solid var(--accent-green)}
.feedback.wrong{border-left-color:var(--accent-coral)}
/* Results */
.result-screen{max-width:700px;margin:0 auto;text-align:center}
.trophy{font-size:5rem;animation:bounceIn .6s ease;margin-bottom:1rem}
@keyframes bounceIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.score-big{font-family:var(--font-display);font-size:3.5rem;font-weight:800;margin-bottom:.25rem}
.grade-badge{display:inline-block;padding:.4rem 1.5rem;border-radius:100px;font-family:var(--font-display);font-size:1.1rem;font-weight:800;margin-bottom:1.5rem}
.analysis{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.5rem 0;text-align:left}
.a-item{background:var(--bg-surface);border-radius:var(--radius-sm);padding:1rem}
.a-label{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.a-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700}
.lesson-tag{display:inline-flex;align-items:center;gap:.4rem;background:rgba(59,158,255,.15);border:1px solid rgba(59,158,255,.3);border-radius:8px;padding:.4rem .75rem;font-size:.82rem;color:var(--accent-blue);margin:.25rem}
/* Shop */
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:1.25rem}
.shop-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;text-align:center;transition:var(--transition);cursor:pointer;position:relative}
.shop-item:hover{border-color:var(--accent-gold);box-shadow:var(--glow-gold);transform:translateY(-3px)}
.shop-item.owned{border-color:var(--accent-green);background:rgba(0,229,160,.05)}
/* Leaderboard */
.leader-row{display:flex;align-items:center;gap:1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.5rem;transition:var(--transition);margin-bottom:.6rem}
.leader-self{border-color:var(--accent-green)!important;background:rgba(0,229,160,.05)}
/* Toast */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg-card);border:1px solid var(--accent-green);border-radius:var(--radius-sm);padding:1rem 1.5rem;z-index:9999;animation:slideUp .3s ease;box-shadow:var(--glow-green);font-weight:600;max-width:320px}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:calc(var(--radius)*1.5);padding:2rem;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative}
/* Animations */
.fade{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* Responsive */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:.75rem}
  .main{margin-left:0;padding:1rem}
  .app{flex-direction:column}
  .nav-links{flex-direction:row;flex-wrap:wrap}
  .nav-link span.label{display:none}
  .nav-bottom{border-top:none;margin-left:auto}
  .nav-logo{margin-bottom:0}
  .analysis{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useContext, createContext, useRef } = React;

// ── Mock Auth Context (no Firebase needed for demo) ──────────
const AuthCtx = createContext();
const useAuth = () => useContext(AuthCtx);

const AuthProvider = ({ children }) => {
  const [currentUser, setCurrentUser] = useState(null);
  const [userProfile, setUserProfile] = useState(null);

  const defaultProfile = (name) => ({
    displayName: name, avatar: '🦊', points: 200, level: 1,
    badges: [], purchasedItems: [], completedGames: [], completedLessons: [], joinedAt: new Date().toISOString()
  });

  const signup = (email, password, name) => {
    const profile = defaultProfile(name);
    setCurrentUser({ email, uid: 'demo-' + Date.now() });
    setUserProfile(profile);
    return Promise.resolve();
  };

  const login = (email, password) => {
    const profile = defaultProfile('Demo Player');
    setCurrentUser({ email, uid: 'demo-user' });
    setUserProfile({ ...profile, points: 350, level: 1, completedLessons: ['budgeting-basics'] });
    return Promise.resolve();
  };

  const logout = () => { setCurrentUser(null); setUserProfile(null); return Promise.resolve(); };

  const addPoints = (pts) => {
    setUserProfile(p => {
      const np = (p.points || 0) + pts;
      return { ...p, points: np, level: Math.floor(np / 500) + 1 };
    });
    return Promise.resolve();
  };

  const updateProfileData = (data) => {
    setUserProfile(p => ({ ...p, ...data }));
    return Promise.resolve();
  };

  const markComplete = (type, id) => {
    const field = type === 'lesson' ? 'completedLessons' : 'completedGames';
    setUserProfile(p => {
      const cur = p[field] || [];
      if (cur.includes(id)) return p;
      return { ...p, [field]: [...cur, id] };
    });
    return Promise.resolve();
  };

  const purchaseItem = (item) => {
    if ((userProfile?.points || 0) < item.cost) return Promise.resolve(false);
    setUserProfile(p => ({
      ...p,
      points: p.points - item.cost,
      purchasedItems: [...(p.purchasedItems || []), item.id]
    }));
    return Promise.resolve(true);
  };

  return (
    <AuthCtx.Provider value={{ currentUser, userProfile, signup, login, logout, addPoints, updateProfileData, markComplete, purchaseItem }}>
      {children}
    </AuthCtx.Provider>
  );
};

// ── Toast hook ─────────────────────────────────────────────
const useToast = () => {
  const [toast, setToast] = useState('');
  const show = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };
  const Toast = () => toast ? <div className="toast">{toast}</div> : null;
  return [show, Toast];
};

// ═══════════════════════════════════════════════════════════
// LANDING PAGE
// ═══════════════════════════════════════════════════════════
const LandingPage = ({ navigate }) => {
  const features = [
    ['🎮','Learn by Playing','Interactive games make finance fun and memorable.'],
    ['📚','Expert Lessons','Bite-sized lessons on budgeting, investing & more.'],
    ['🏆','Earn Rewards','Collect points and badges as you level up.'],
    ['📊','Track Progress','See your financial IQ grow in real time.'],
    ['🛒','Avatar Shop','Spend points on cool profile customizations.'],
    ['🌍','Leaderboard','Compete with friends and top learners globally.'],
  ];
  return (
    <div className="landing">
      <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0}}>
        <div className="orb o1"/><div className="orb o2"/><div className="orb o3"/>
      </div>
      <nav className="lnav">
        <div style={{fontFamily:'var(--font-display)',fontSize:'1.4rem',fontWeight:800}}>
          <span className="gt">Fin</span>Quest 💰
        </div>
        <div style={{display:'flex',gap:'1rem'}}>
          <button className="btn btn-s" onClick={()=>navigate('login')}>Login</button>
          <button className="btn btn-p" onClick={()=>navigate('signup')}>Sign Up Free</button>
        </div>
      </nav>
      <section className="hero">
        <div style={{display:'inline-flex',alignItems:'center',gap:'.5rem',background:'rgba(0,229,160,.1)',border:'1px solid rgba(0,229,160,.3)',borderRadius:'100px',padding:'.4rem 1rem',fontSize:'.85rem',color:'var(--accent-green)',marginBottom:'1.5rem',fontWeight:600}}>
          🚀 Free Financial Education Platform
        </div>
        <h1 style={{marginBottom:'1.5rem',maxWidth:'700px'}}>
          Master Money.{' '}<span className="gt">Play. Learn. Win.</span>
        </h1>
        <p style={{fontSize:'1.05rem',maxWidth:'520px',marginBottom:'2.5rem',lineHeight:'1.8'}}>
          FinQuest gamifies financial literacy — earn points, beat challenges, and build real-world money skills through interactive games and lessons.
        </p>
        <div style={{display:'flex',gap:'1rem',flexWrap:'wrap',justifyContent:'center',marginBottom:'2.5rem'}}>
          <button className="btn btn-p" style={{fontSize:'1rem',padding:'1rem 2rem'}} onClick={()=>navigate('signup')}>🎮 Start Playing Free</button>
          <button className="btn btn-s" style={{fontSize:'1rem',padding:'1rem 2rem'}} onClick={()=>navigate('login')}>Already have account?</button>
        </div>
        <div style={{display:'flex',gap:'3rem',flexWrap:'wrap',justifyContent:'center'}}>
          {[['10K+','Players'],['50+','Lessons'],['4','Games'],['∞','Fun']].map(([v,l])=>(
            <div key={l} style={{textAlign:'center'}}>
              <div style={{fontFamily:'var(--font-display)',fontSize:'2rem',fontWeight:800}} className="gt">{v}</div>
              <div style={{fontSize:'.85rem',color:'var(--text-secondary)'}}>{l}</div>
            </div>
          ))}
        </div>
      </section>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'1.25rem',padding:'0 3rem 4rem',position:'relative',zIndex:1,maxWidth:'1100px',margin:'0 auto',width:'100%'}}>
        {features.map(([icon,title,desc])=>(
          <div key={title} style={{background:'rgba(15,24,39,.8)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'1.5rem',textAlign:'center',backdropFilter:'blur(10px)',transition:'var(--transition)'}}>
            <div style={{fontSize:'2.5rem',marginBottom:'1rem'}}>{icon}</div>
            <h3 style={{fontSize:'1rem',marginBottom:'.4rem'}}>{title}</h3>
            <p style={{fontSize:'.85rem'}}>{desc}</p>
          </div>
        ))}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// AUTH PAGES
// ═══════════════════════════════════════════════════════════
const Login = ({ navigate }) => {
  const { login } = useAuth();
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = async (e) => {
    e.preventDefault();
    if (!email || !pw) { setErr('Please fill in all fields.'); return; }
    setLoading(true);
    await login(email, pw);
    navigate('dashboard');
  };

  return (
    <div className="auth-page">
      <div className="orb o1" style={{opacity:.06,position:'fixed'}}/><div className="orb o2" style={{opacity:.06,position:'fixed'}}/>
      <div className="auth-card fade">
        <div style={{textAlign:'center',marginBottom:'2rem'}}>
          <div style={{fontSize:'2.5rem',marginBottom:'.5rem'}}>💰</div>
          <h2>Welcome Back!</h2>
          <p style={{fontSize:'.9rem',marginTop:'.3rem'}}>Log in to continue your FinQuest journey</p>
        </div>
        <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:'1.2rem'}}>
          <div><label className="label">Email</label><input className="input" type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
          <div><label className="label">Password</label><input className="input" type="password" placeholder="Your password" value={pw} onChange={e=>setPw(e.target.value)}/></div>
          {err && <div className="err">⚠️ {err}</div>}
          <button className="btn btn-p" type="submit" disabled={loading} style={{width:'100%',justifyContent:'center',fontSize:'1rem'}}>
            {loading ? '⏳ Logging in...' : '🚀 Log In'}
          </button>
        </form>
        <div style={{background:'rgba(59,158,255,.1)',border:'1px solid rgba(59,158,255,.3)',borderRadius:'var(--radius-sm)',padding:'.75rem',marginTop:'1rem',fontSize:'.82rem',color:'var(--accent-blue)'}}>
          💡 <strong>Demo Mode:</strong> Enter any email & password to explore the app!
        </div>
        <div style={{textAlign:'center',marginTop:'1.5rem',fontSize:'.9rem',color:'var(--text-secondary)'}}>
          Don't have an account?{' '}
          <button style={{background:'none',border:'none',color:'var(--accent-green)',cursor:'pointer',fontWeight:600,fontSize:'.9rem'}} onClick={()=>navigate('signup')}>Sign up free</button>
        </div>
        <div style={{textAlign:'center',marginTop:'.5rem'}}>
          <button style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'.9rem'}} onClick={()=>navigate('landing')}>← Back to home</button>
        </div>
      </div>
    </div>
  );
};

const Signup = ({ navigate }) => {
  const { signup } = useAuth();
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handle = async (e) => {
    e.preventDefault();
    if (!name||!email||!pw) { setErr('Please fill in all fields.'); return; }
    if (pw !== confirm) { setErr('Passwords do not match.'); return; }
    if (pw.length < 4) { setErr('Password must be at least 4 characters.'); return; }
    setLoading(true);
    await signup(email, pw, name);
    navigate('dashboard');
  };

  return (
    <div className="auth-page">
      <div className="orb o1" style={{opacity:.06,position:'fixed'}}/><div className="orb o3" style={{opacity:.05,position:'fixed'}}/>
      <div className="auth-card fade">
        <div style={{textAlign:'center',marginBottom:'2rem'}}>
          <div style={{fontSize:'2.5rem',marginBottom:'.5rem'}}>🎮</div>
          <h2>Join FinQuest</h2>
          <p style={{fontSize:'.9rem',marginTop:'.3rem'}}>Create your free account and start earning points</p>
        </div>
        <form onSubmit={handle} style={{display:'flex',flexDirection:'column',gap:'1.2rem'}}>

const LessonModal = ({ lesson, onClose, onComplete, done }) => {
  const [step, setStep] = useState(0);
  const total = lesson.content.length;
  const cur = lesson.content[step];
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal fade" onClick={e=>e.stopPropagation()}>
        <div style={{background:lesson.bg,borderRadius:'var(--radius)',height:110,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'3rem',marginBottom:'1.5rem'}}>{lesson.icon}</div>
        <div style={{display:'flex',gap:'.3rem',marginBottom:'1.5rem'}}>
          {lesson.content.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?lesson.color:'var(--bg-surface)',transition:'background .3s'}}/>)}

          {step<total-1 ? (
            <button className="btn btn-p" onClick={()=>setStep(s=>s+1)}>Next →</button>
          ) : (
            <button className="btn btn-g" onClick={()=>{onComplete(lesson);onClose()}} disabled={done}>
              {done ? '✅ Completed' : `🏆 Complete (+${lesson.points} pts)`}
            </button>
          )}

        <button onClick={onClose} style={{position:'absolute',top:'1rem',right:'1rem',background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'1.2rem'}}>✕</button>

};

const Lessons = () => {
  const { userProfile, markComplete, addPoints } = useAuth();
  const [selected, setSelected] = useState(null);
  const [showToast, Toast] = useToast();
  const completed = userProfile?.completedLessons||[];

  const handleComplete = async (lesson) => {
    if (completed.includes(lesson.id)) return;
    await markComplete('lesson', lesson.id);
    await addPoints(lesson.points);
    showToast(`🎉 +${lesson.points} points! "${lesson.title}" completed!`);
  };

  return (
    <div className="fade">
      <div style={{marginBottom:'2rem'}}><h2>📚 Lessons</h2><p>Learn financial concepts. Complete each one to earn points!</p></div>
      <div style={{display:'flex',gap:'.5rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
        <span className="badge bg">✅ {completed.length} completed</span>
        <span className="badge bb">📖 {LESSONS.length-completed.length} remaining</span>
        <span className="badge bgo">⭐ {LESSONS.filter(l=>completed.includes(l.id)).reduce((s,l)=>s+l.points,0)} pts earned</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'1.25rem'}}>
        {LESSONS.map(lesson=>{
          const done = completed.includes(lesson.id);
          return (
            <div key={lesson.id} className="card" style={{cursor:'pointer',overflow:'hidden',padding:0,border:done?'1px solid var(--accent-green)':'1px solid var(--border)'}} onClick={()=>setSelected(lesson)}>
              <div style={{background:lesson.bg,height:110,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'3rem'}}>{lesson.icon}</div>
              <div style={{padding:'1.2rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.4rem'}}>
                  <span className="badge bb">{lesson.category}</span>
                  {done && <span style={{color:'var(--accent-green)',fontSize:'.82rem',fontWeight:600}}>✅ Done</span>}
                </div>
                <h3 style={{fontSize:'1.05rem',marginBottom:'.4rem'}}>{lesson.title}</h3>
                <div style={{display:'flex',gap:'.75rem',fontSize:'.78rem',color:'var(--text-muted)',marginTop:'.6rem'}}>
                  <span>⏱ {lesson.duration}</span><span>⭐ {lesson.points} pts</span><span>📄 {lesson.content.length} sections</span>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {selected && <LessonModal lesson={selected} onClose={()=>setSelected(null)} onComplete={handleComplete} done={completed.includes(selected.id)}/>}
      <Toast/>
    </div>
  );
};

  const [values, setValues] = useState({});

  const total = SCENARIO.categories.reduce((s,c)=>s+(parseInt(values[c.key])||0),0);
  const remaining = SCENARIO.income - total;

  const evaluate = () => {
    let score = 0, fb = [];
    SCENARIO.categories.forEach(cat=>{
      const v = parseInt(values[cat.key])||0, [mn,mx] = cat.ideal;
      if(v>=mn&&v<=mx){score+=20;fb.push({status:'good',msg:`✅ Great: ${cat.label.split(' ')[1]} allocation is ideal!`})}
      else if(v<mn){score+=5;fb.push({status:'low',msg:`⚠️ ${cat.label.split(' ')[1]} too low. Ideal: ₹${mn.toLocaleString()}–${mx.toLocaleString()}`})}
      else{fb.push({status:'high',msg:`❌ Overspending on ${cat.label.split(' ')[1]}. Ideal: ₹${mn.toLocaleString()}–${mx.toLocaleString()}`})}
    });
    setResult({score:Math.min(100,score),fb,remaining});
  };

  if(result){
    const grade = result.score>=80?'A':result.score>=60?'B':result.score>=40?'C':'D';
    const gc = {A:'var(--accent-green)',B:'var(--accent-blue)',C:'var(--accent-gold)',D:'var(--accent-coral)'}[grade];
    return (
      <div className="result-screen fade">
        <div className="trophy">{grade==='A'?'🏆':grade==='B'?'🥈':grade==='C'?'🎯':'📊'}</div>
        <h2>Budget Evaluation</h2>
        <div className="score-big" style={{color:gc}}>{result.score}/100</div>
        <div className="grade-badge" style={{background:gc+'22',color:gc,border:`1px solid ${gc}`}}>Grade {grade}</div>
        <div style={{textAlign:'left',marginBottom:'1.5rem'}}>
          {result.fb.map((f,i)=>(
            <div key={i} style={{padding:'.7rem 1rem',background:'var(--bg-surface)',borderRadius:'var(--radius-sm)',marginBottom:'.5rem',fontSize:'.88rem',borderLeft:`3px solid ${f.status==='good'?'var(--accent-green)':f.status==='low'?'var(--accent-gold)':'var(--accent-coral)'}`}}>{f.msg}</div>
          ))}
          <div style={{padding:'.7rem 1rem',background:'var(--bg-surface)',borderRadius:'var(--radius-sm)',fontSize:'.88rem',borderLeft:`3px solid ${remaining>=0?'var(--accent-green)':'var(--accent-coral)'}`}}>
            {remaining>=0?`✅ ₹${remaining.toLocaleString()} unallocated — great financial buffer!`:`❌ Overspent by ₹${Math.abs(remaining).toLocaleString()}!`}
          </div>
        </div>
        <div className="card" style={{textAlign:'left',marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'.75rem'}}>📚 Related Financial Topics</h3>
          {['50/30/20 Budgeting Rule','Fixed vs Variable Expenses','Emergency Fund Planning','Pay Yourself First'].map(t=>(
            <span key={t} className="lesson-tag">{t}</span>
          ))}
        </div>
        <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-g" onClick={()=>onComplete(Math.round(result.score*1.5))}>🏆 Claim {Math.round(result.score*1.5)} Points</button>
          <button className="btn btn-s" onClick={()=>{setValues({});setResult(null)}}>Play Again</button>
          <button className="btn btn-s" onClick={onBack}>Back</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
      <button className="btn btn-s" onClick={onBack} style={{marginBottom:'1rem'}}>← Back to Games</button>
      <div style={{textAlign:'center',background:'linear-gradient(135deg,rgba(0,229,160,.1),rgba(59,158,255,.1))',border:'1px solid var(--border-bright)',borderRadius:'var(--radius)',padding:'1.5rem 2rem',marginBottom:'1.5rem'}}>
        <div style={{fontSize:'.85rem',color:'var(--text-secondary)'}}>Monthly Income</div>
        <div style={{fontFamily:'var(--font-display)',fontSize:'3rem',fontWeight:800}} className="gt">₹{SCENARIO.income.toLocaleString()}</div>
        <div style={{fontSize:'.85rem',marginTop:'.5rem'}}>{SCENARIO.emoji} First Job Budget Challenge</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.5rem'}}>
        {SCENARIO.categories.map(cat=>(
          <div key={cat.key} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--bg-surface)',borderRadius:'var(--radius-sm)',padding:'.75rem 1rem',gap:'1rem'}}>
            <div>
              <div style={{fontSize:'.88rem',fontWeight:500}}>{cat.label}</div>
              <div style={{fontSize:'.7rem',color:'var(--text-muted)'}}>Ideal: ₹{cat.ideal[0].toLocaleString()}–{cat.ideal[1].toLocaleString()}</div>
            </div>
            <input type="number" min="0" max="45000" placeholder="₹0" value={values[cat.key]||''} onChange={e=>setValues(p=>({...p,[cat.key]:e.target.value}))}
              style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:8,padding:'.4rem .6rem',color:'var(--text-primary)',fontFamily:'var(--font-body)',width:95,textAlign:'right',fontSize:'.9rem',outline:'none'}}/>
          </div>
        ))}
      </div>
      <div style={{textAlign:'center',fontFamily:'var(--font-display)',fontSize:'1.5rem',fontWeight:800,padding:'1rem',borderRadius:'var(--radius-sm)',color:remaining>=0?'var(--accent-green)':'var(--accent-coral)'}}>
        Remaining: ₹{remaining.toLocaleString()}
      </div>
      <div style={{display:'flex',justifyContent:'center',marginTop:'1.5rem'}}>
        <button className="btn btn-p" onClick={evaluate} disabled={Object.keys(values).length<SCENARIO.categories.length} style={{fontSize:'1rem',padding:'.875rem 2rem'}}>
          📊 Evaluate My Budget
        </button>
      </div>
    </div>
  );
};

const FinanceQuiz = ({ onComplete, onBack }) => {
  const [phase, setPhase] = useState('intro');
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [time, setTime] = useState(30);
  const timerRef = useRef(null);

  useEffect(()=>{
    if(phase!=='quiz'||answered) return;
    timerRef.current = setInterval(()=>{
      setTime(t=>{
        if(t<=1){clearInterval(timerRef.current);handleAnswer(-1);return 0;}
        return t-1;
      });
    },1000);
    return ()=>clearInterval(timerRef.current);
  },[phase,answered,current]);

  const handleAnswer = (i) => {
    if(answered) return;
    clearInterval(timerRef.current);
    setSelected(i); setAnswered(true);
    if(i===QUESTIONS[current].correct) setScore(s=>s+10);
  };

  const next = () => {
    if(current<QUESTIONS.length-1){
      setCurrent(c=>c+1); setSelected(null); setAnswered(false); setTime(30);
    } else { setPhase('result'); }
  };

  if(phase==='intro') return (
    <div style={{maxWidth:700,margin:'0 auto',textAlign:'center'}} className="fade">
      <button className="btn btn-s" onClick={onBack} style={{marginBottom:'1.5rem',float:'left'}}>← Back</button>
      <div style={{clear:'both'}}/>
      <div style={{fontSize:'5rem',marginBottom:'1rem'}}>🧠</div>
      <h2 style={{marginBottom:'.5rem'}}>Financial Literacy Quiz</h2>
      <p style={{marginBottom:'2rem',lineHeight:'1.8'}}>10 questions on budgeting, investing, taxes & more.<br/>⏱️ <strong>30 seconds per question!</strong></p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'1rem',marginBottom:'2rem'}}>
        {[['10','Questions'],['30s','Per Q'],['100','Max Pts']].map(([v,l])=>(
          <div key={l} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'1rem',textAlign:'center'}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:'2rem',fontWeight:800,color:'var(--accent-green)'}}>{v}</div>
            <div style={{fontSize:'.8rem',color:'var(--text-muted)'}}>{l}</div>
          </div>
        ))}
      </div>
      <button className="btn btn-p" onClick={()=>setPhase('quiz')} style={{fontSize:'1rem',padding:'1rem 2.5rem'}}>🚀 Start Quiz</button>
    </div>
  );

  if(phase==='result'){
    const g = score>=80?'A':score>=60?'B':score>=40?'C':'D';
    const gc = {A:'var(--accent-green)',B:'var(--accent-blue)',C:'var(--accent-gold)',D:'var(--accent-coral)'}[g];
    return (
      <div className="result-screen fade">
        <div className="trophy">{g==='A'?'🏆':g==='B'?'🥈':g==='C'?'🎯':'📚'}</div>
        <h2>Quiz Complete!</h2>
        <div className="score-big" style={{color:gc}}>{score}/100</div>
        <div className="grade-badge" style={{background:gc+'22',color:gc,border:`1px solid ${gc}`}}>
          Grade {g} — {g==='A'?'Finance Expert!':g==='B'?'Smart Learner':g==='C'?'Developing Well':'Keep Practicing!'}
        </div>
        <div className="analysis">
          {[['Correct',`${score/10}/10`,'var(--accent-green)'],['Wrong',`${(100-score)/10}/10`,'var(--accent-coral)'],['Accuracy',`${score}%`,gc],['Points',`⭐ ${score*2}`,'var(--accent-gold)']].map(([l,v,c])=>(
            <div key={l} className="a-item"><div className="a-label">{l}</div><div className="a-val" style={{color:c}}>{v}</div></div>
          ))}
        </div>
        <div className="card" style={{textAlign:'left',marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'.75rem'}}>📚 Deepen Your Knowledge</h3>
          {['Compound Interest Math','50/30/20 Budgeting','Emergency Fund Strategy','Credit Score Factors','Stock Market Basics','Tax Slab Planning'].map(t=>(
            <span key={t} className="lesson-tag">{t}</span>
          ))}
        </div>
        <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-g" onClick={()=>onComplete(score*2)}>🏆 Claim {score*2} Points</button>
          <button className="btn btn-s" onClick={onBack}>Back to Games</button>
        </div>
      </div>
    );
  }

  const q = QUESTIONS[current];
  return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
      <div className="game-hud">
        <div><div className="hud-v">{current+1}/10</div><div className="hud-l">Question</div></div>
        <div><div className="hud-v" style={{color:time<=10?'var(--accent-coral)':'var(--accent-green)'}}>{time}s</div><div className="hud-l">Time</div></div>
        <div><div className="hud-v" style={{color:'var(--accent-gold)'}}>{score}</div><div className="hud-l">Score</div></div>
        <div style={{textAlign:'center'}}>
          <div style={{display:'flex',gap:3,justifyContent:'center',marginBottom:2}}>
            {QUESTIONS.map((_,i)=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:i<current?'var(--accent-green)':i===current?'var(--accent-gold)':'var(--bg-surface)'}}/>)}
          </div>
          <div className="hud-l">Progress</div>
        </div>
      </div>
      <div className="prog-wrap" style={{marginBottom:'1.5rem'}}>
        <div className="prog-fill" style={{width:`${(time/30)*100}%`,background:time<=10?'linear-gradient(90deg,var(--accent-coral),#ff9500)':undefined,transition:'width 1s linear'}}/>
      </div>
      <div className="card" style={{marginBottom:'1.5rem'}}>
        <span className="badge bb" style={{marginBottom:'.75rem',display:'inline-block'}}>{q.cat}</span>
        <p style={{color:'var(--text-muted)',fontSize:'.85rem',marginBottom:'.5rem'}}>Question {current+1} of 10 — 10 points</p>
        <p style={{fontSize:'1.1rem',lineHeight:'1.5',marginBottom:'1.5rem',color:'var(--text-primary)'}}>{q.q}</p>
        {q.opts.map((opt,i)=>{
          const letters=['A','B','C','D'];
          let cls='choice';
          if(answered){if(i===q.correct)cls+=' correct';else if(i===selected)cls+=' wrong';}
          return (
            <button key={i} className={cls} onClick={()=>handleAnswer(i)} disabled={answered}>
              <span className="cletter">{letters[i]}</span>{opt}
            </button>
          );
        })}
        {answered && (
          <div className={`feedback ${selected!==q.correct?'wrong':''}`}>
            <strong>{selected===q.correct?'✅ Correct!':selected===-1?'⏰ Time\'s up!':'❌ Incorrect!'}</strong><br/>{q.exp}
          </div>
        )}
      </div>
      {answered && (
        <div style={{display:'flex',justifyContent:'flex-end'}}>
          <button className="btn btn-p" onClick={next}>{current<QUESTIONS.length-1?'Next Question →':'🏁 See Results'}</button>
        </div>
      )}
    </div>
  );
};

const ASSETS = [
  {id:'nifty',name:'Nifty 50 Index',icon:'📈',risk:'Medium',color:'#3b9eff',baseR:.015,vol:.08},
  {id:'gold',name:'Digital Gold',icon:'🥇',risk:'Low-Med',color:'#ffd94a',baseR:.012,vol:.04},

  {id:'bonds',name:'Govt Bonds',icon:'🏛️',risk:'Very Low',color:'#00e5a0',baseR:.006,vol:.005},
  {id:'fd',name:'Fixed Deposit',icon:'🏦',risk:'None',color:'#ff6b6b',baseR:.0054,vol:0},
];
const EVENTS_INV = [
  {title:'📉 Market Crash',desc:'Global recession fears hit equity markets.',eff:{nifty:-.18,gold:.10,crypto:-.35,bonds:.05,fd:0}},
  {title:'🚀 Bull Run!',desc:'Strong economic data triggers massive rally.',eff:{nifty:.22,gold:-.05,crypto:.40,bonds:-.03,fd:0}},
  {title:'💰 Rate Cut',desc:'RBI cuts rates, boosting real estate & equities.',eff:{nifty:.08,gold:.07,crypto:.05,bonds:-.04,fd:-.01}},
  {title:'📊 Stable Quarter',desc:'Markets trade sideways.',eff:{nifty:.02,crypto:-.03,gold:.02,bonds:.02,fd:0}},
  {title:'⚡ Inflation Spike',desc:'Inflation rises — gold benefits.',eff:{nifty:-.04,crypto:-.08,gold:.20,bonds:-.06,fd:-.01}},
];

const InvestmentSim = ({ onComplete, onBack }) => {
  const [phase, setPhase] = useState('intro');
  const [round, setRound] = useState(1);
  const [cash, setCash] = useState(100000);
  const [portfolio, setPortfolio] = useState({});
  const [prices, setPrices] = useState(Object.fromEntries(ASSETS.map(a=>[a.id,100])));
  const [inputs, setInputs] = useState({});
  const [event, setEvent] = useState(null);
  const [roundRet, setRoundRet] = useState({});
  const [history, setHistory] = useState([{round:0,worth:100000}]);
  const ROUNDS = 4;

  const portfolioVal = ASSETS.reduce((s,a)=>s+(portfolio[a.id]||0)*prices[a.id],0);
  const netWorth = cash + portfolioVal;

  const invest = () => {
    const total = Object.values(inputs).reduce((s,v)=>s+(parseFloat(v)||0),0);
    if(total>cash) return;
    const np = {...portfolio};
    let nc = cash - total;
    Object.entries(inputs).forEach(([id,amt])=>{const a=parseFloat(amt)||0;if(a>0)np[id]=(np[id]||0)+a/prices[id];});
    setCash(nc); setPortfolio(np); setInputs({});
    const ev = EVENTS_INV[Math.floor(Math.random()*EVENTS_INV.length)];
    setEvent(ev); setPhase('event');
  };

  const applyEvent = () => {
    const np = {...prices};
    const ret = {};
    ASSETS.forEach(a=>{
      const r = (a.baseR + (event.eff[a.id]||0) + (Math.random()-.5)*a.vol);
      np[a.id] = prices[a.id]*(1+r); ret[a.id]=r;
    });
    setPrices(np); setRoundRet(ret);
    const pv = ASSETS.reduce((s,a)=>s+(portfolio[a.id]||0)*np[a.id],0);
    const nw = cash + pv;
    setHistory(h=>[...h,{round,worth:nw}]);
    setPhase('roundResult');
  };

  const next = () => { if(round>=ROUNDS){setPhase('final');}else{setRound(r=>r+1);setPhase('invest');} };

  const sell = (id) => {
    const val = (portfolio[id]||0)*prices[id];
    setPortfolio(p=>({...p,[id]:0}));
    setCash(c=>c+val);
  };

  if(phase==='intro') return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
      <button className="btn btn-s" onClick={onBack} style={{marginBottom:'1.5rem'}}>← Back</button>
      <div style={{textAlign:'center',background:'linear-gradient(135deg,rgba(162,89,255,.1),rgba(59,158,255,.1))',border:'1px solid rgba(162,89,255,.3)',borderRadius:'var(--radius)',padding:'2rem',marginBottom:'1.5rem'}}>
        <div style={{fontSize:'3rem',fontFamily:'var(--font-display)',fontWeight:800,color:'var(--accent-purple)'}}>₹1,00,000</div>
        <div style={{fontSize:'.9rem',color:'var(--text-secondary)',marginTop:'.5rem'}}>Starting Capital · {ROUNDS} Rounds</div>
      </div>
      <h2 style={{marginBottom:'1rem'}}>📈 Investment Simulator</h2>
      <p style={{lineHeight:'1.8',marginBottom:'1.5rem'}}>Invest across 5 asset classes over {ROUNDS} rounds. Random market events will affect your portfolio — make smart decisions to maximize wealth!</p>
      <div className="card" style={{marginBottom:'1.5rem'}}>
        {ASSETS.map(a=>(
          <div key={a.id} style={{display:'flex',alignItems:'center',gap:'1rem',padding:'.65rem 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:'1.5rem'}}>{a.icon}</span>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:'.9rem'}}>{a.name}</div></div>
            <span className="badge" style={{background:a.color+'22',color:a.color,border:`1px solid ${a.color}55`}}>{a.risk}</span>
          </div>
        ))}
      </div>
      <button className="btn btn-p" onClick={()=>setPhase('invest')} style={{width:'100%',justifyContent:'center',fontSize:'1rem',padding:'1rem'}}>🚀 Start Investing</button>
    </div>
  );

  if(phase==='invest'){
    const alloc = Object.values(inputs).reduce((s,v)=>s+(parseFloat(v)||0),0);
    return (
      <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
        <div className="game-hud">
          <div><div className="hud-v">{round}/{ROUNDS}</div><div className="hud-l">Round</div></div>
          <div><div className="hud-v" style={{color:'var(--accent-green)'}}>₹{Math.round(cash).toLocaleString()}</div><div className="hud-l">Cash</div></div>
          <div><div className="hud-v" style={{color:'var(--accent-purple)'}}>₹{Math.round(portfolioVal).toLocaleString()}</div><div className="hud-l">Portfolio</div></div>
          <div><div className="hud-v" style={{color:netWorth>=100000?'var(--accent-green)':'var(--accent-coral)'}}>₹{Math.round(netWorth).toLocaleString()}</div><div className="hud-l">Net Worth</div></div>
        </div>
        {Object.values(portfolio).some(v=>v>0) && (
          <div className="card" style={{marginBottom:'1rem'}}>
            <h4 style={{marginBottom:'.75rem'}}>Current Holdings</h4>
            {ASSETS.filter(a=>(portfolio[a.id]||0)>0).map(a=>(
              <div key={a.id} style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'.5rem'}}>
                <span style={{fontSize:'1.5rem'}}>{a.icon}</span>
                <div style={{flex:1}}><div style={{fontWeight:600,fontSize:'.9rem'}}>{a.name}</div><div style={{fontSize:'.78rem',color:'var(--text-muted)'}}>₹{Math.round((portfolio[a.id]||0)*prices[a.id]).toLocaleString()}</div></div>
                <button onClick={()=>sell(a.id)} style={{padding:'.3rem .6rem',borderRadius:8,border:'none',background:'rgba(255,107,107,.2)',color:'var(--accent-coral)',cursor:'pointer',fontSize:'.8rem',fontWeight:700}}>Sell</button>
              </div>
            ))}
          </div>
        )}
        <div className="card" style={{marginBottom:'1rem'}}>
          <h4 style={{marginBottom:'.75rem'}}>Invest This Round (Available: ₹{Math.round(cash-alloc).toLocaleString()})</h4>
          {ASSETS.map(a=>(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'.6rem'}}>
              <span style={{fontSize:'1.3rem'}}>{a.icon}</span>
              <div style={{flex:1,fontSize:'.88rem',fontWeight:500}}>{a.name}</div>

            </div>
          ))}

          <button className="btn btn-p" onClick={invest} style={{fontSize:'1rem',padding:'.875rem 2rem'}}>⏭️ Proceed to Market Event</button>
          <button className="btn btn-s" onClick={next}>Skip Round</button>
        </div>
      </div>
    );
  }

  if(phase==='event') return (
    <div style={{maxWidth:700,margin:'0 auto',textAlign:'center'}} className="fade">
      <div style={{fontSize:'4rem',marginBottom:'1rem',animation:'bounceIn .6s ease'}}>📰</div>
      <span className="badge bp" style={{marginBottom:'1rem',display:'inline-block'}}>Market Event — Round {round}</span>
      <h2 style={{marginBottom:'1rem'}}>{event?.title}</h2>
      <p style={{lineHeight:'1.7',maxWidth:480,margin:'0 auto 2rem'}}>{event?.desc}</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'.5rem',marginBottom:'2rem'}}>
        {ASSETS.map(a=>{
          const eff=event?.eff[a.id]||0;
          return (
            <div key={a.id} style={{background:'var(--bg-surface)',borderRadius:'var(--radius-sm)',padding:'.75rem .5rem',textAlign:'center'}}>
              <div style={{fontSize:'1.3rem'}}>{a.icon}</div>
              <div style={{fontSize:'.7rem',fontWeight:600,margin:'.2rem 0'}}>{a.name.split(' ')[0]}</div>
              <div style={{fontWeight:800,color:eff>=0?'var(--accent-green)':'var(--accent-coral)'}}>{eff>=0?'+':''}{(eff*100).toFixed(0)}%</div>
            </div>
          );
        })}
      </div>
      <button className="btn btn-g" onClick={applyEvent} style={{fontSize:'1rem',padding:'1rem 2rem'}}>📊 See My Portfolio Results →</button>
    </div>
  );

  if(phase==='roundResult'){
    const prev = history[history.length-2]?.worth||100000;
    const chg = netWorth-prev, chgP=(chg/prev)*100;
    return (
      <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
        <h3 style={{marginBottom:'1.5rem',textAlign:'center'}}>Round {round} Results</h3>
        <div style={{textAlign:'center',background:'linear-gradient(135deg,rgba(162,89,255,.1),rgba(59,158,255,.1))',border:'1px solid rgba(162,89,255,.3)',borderRadius:'var(--radius)',padding:'1.5rem',marginBottom:'1.5rem'}}>
          <div style={{fontSize:'3rem',fontFamily:'var(--font-display)',fontWeight:800,color:chg>=0?'var(--accent-green)':'var(--accent-coral)'}}>₹{Math.round(netWorth).toLocaleString()}</div>
          <div style={{marginTop:'.5rem',fontWeight:700,color:chg>=0?'var(--accent-green)':'var(--accent-coral)'}}>
            {chg>=0?'▲':'▼'} ₹{Math.abs(Math.round(chg)).toLocaleString()} ({chgP.toFixed(1)}%)
          </div>
        </div>
        <div className="card" style={{marginBottom:'1.5rem'}}>
          <h4 style={{marginBottom:'1rem'}}>Asset Performance</h4>
          {ASSETS.map(a=>{const r=roundRet[a.id]||0;return(
            <div key={a.id} style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'.5rem',opacity:(portfolio[a.id]||0)>0?1:.5}}>
              <span style={{fontSize:'1.3rem'}}>{a.icon}</span>
              <div style={{flex:1,fontWeight:600,fontSize:'.88rem'}}>{a.name}</div>
              <span style={{fontWeight:800,color:r>=0?'var(--accent-green)':'var(--accent-coral)'}}>{r>=0?'+':''}{(r*100).toFixed(1)}%</span>
            </div>
          );})}
        </div>
        <div style={{textAlign:'center'}}><button className="btn btn-p" onClick={next} style={{fontSize:'1rem',padding:'1rem 2rem'}}>{round<ROUNDS?`▶ Round ${round+1}`:'🏁 Final Results'}</button></div>
      </div>
    );
  }

  if(phase==='final'){
    const gain = netWorth-100000, gp=(gain/100000)*100;
    const gd = gp>=25?{g:'A',l:'Investment Genius! 🧠',pts:200,c:'var(--accent-green)'}:gp>=12?{g:'B',l:'Smart Investor 📈',pts:150,c:'var(--accent-blue)'}:gp>=0?{g:'C',l:'Safe Player 🛡️',pts:100,c:'var(--accent-gold)'}:{g:'D',l:'High Risk Taker 😬',pts:50,c:'var(--accent-coral)'};
    return (
      <div className="result-screen fade">
        <div className="trophy">💎</div>
        <h2>Investment Challenge Complete!</h2>
        <div className="score-big" style={{color:gd.c}}>₹{Math.round(netWorth).toLocaleString()}</div>
        <div className="grade-badge" style={{background:gd.c+'22',color:gd.c,border:`1px solid ${gd.c}`}}>{gd.g} — {gd.l}</div>
        <div className="analysis">
          {[['Starting',`₹1,00,000`,'var(--text-primary)'],['Final Worth',`₹${Math.round(netWorth).toLocaleString()}`,gd.c],['Gain/Loss',`${gain>=0?'+':''}₹${Math.abs(Math.round(gain)).toLocaleString()}`,gain>=0?'var(--accent-green)':'var(--accent-coral)'],['Return',`${gp.toFixed(1)}%`,gd.c]].map(([l,v,c])=>(
            <div key={l} className="a-item"><div className="a-label">{l}</div><div className="a-val" style={{color:c}}>{v}</div></div>
          ))}
        </div>
        <div className="card" style={{textAlign:'left',marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'.75rem'}}>📚 Investment Topics to Master</h3>
          {['Asset Allocation & Diversification','Risk vs Return','Market Volatility & Psychology','Compound Returns','Portfolio Rebalancing'].map(t=><span key={t} className="lesson-tag">{t}</span>)}
        </div>
        <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-g" onClick={()=>onComplete(gd.pts)}>🏆 Claim {gd.pts} Points</button>
          <button className="btn btn-s" onClick={onBack}>Back to Games</button>
        </div>
      </div>
    );
  }
  return null;
};

const LifeSimulator = ({ onComplete, onBack }) => {
  const [stageIdx, setStageIdx] = useState(null);
  const [sceneIdx, setSceneIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const stage = stageIdx!==null ? STAGES_DATA[stageIdx] : null;
  const scene = stage ? stage.scenes[sceneIdx] : null;

  const reset = (idx) => { setStageIdx(idx);setSceneIdx(0);setSelected(null);setAnswered(false);setScore(0);setDone(false); };

  const answer = (i) => {
    if(answered)return;
    setSelected(i); setAnswered(true);
    if(i===scene.correct) setScore(s=>s+10);
  };

  const next = () => {
    if(sceneIdx<stage.scenes.length-1){setSceneIdx(s=>s+1);setSelected(null);setAnswered(false);}
    else{setDone(true);}
  };

  if(stageIdx===null) return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
      <button className="btn btn-s" onClick={onBack} style={{marginBottom:'1.5rem'}}>← Back to Games</button>
      <h2 style={{marginBottom:'.5rem'}}>🎭 Life Financial Simulator</h2>
      <p style={{marginBottom:'1.5rem'}}>Walk through financial life stages. Make smart decisions, earn points, and learn!</p>
      {STAGES_DATA.map((s,i)=>(
        <div key={s.id} className="card" style={{display:'flex',alignItems:'center',gap:'1.5rem',cursor:'pointer',marginBottom:'1rem'}} onClick={()=>reset(i)}>
          <div style={{fontSize:'3rem'}}>{s.emoji}</div>
          <div style={{flex:1}}>
            <h3 style={{marginBottom:'.25rem'}}>{s.title}</h3>
            <p style={{fontSize:'.85rem'}}>{s.scenes.length} scenarios · Up to {s.scenes.length*10} points</p>
          </div>
          <button className="btn btn-p">Start</button>
        </div>
      ))}
    </div>
  );

  if(done){
    const pct = Math.round(score/(stage.scenes.length*10)*100);
    const g = pct>=85?'A':pct>=65?'B':pct>=45?'C':'D';
    const gc = {A:'var(--accent-green)',B:'var(--accent-blue)',C:'var(--accent-gold)',D:'var(--accent-coral)'}[g];
    return (
      <div className="result-screen fade">
        <div className="trophy">{g==='A'?'🏆':g==='B'?'🥈':'🎯'}</div>
        <h2>{stage.title} — Complete!</h2>
        <div className="score-big" style={{color:gc}}>{pct}%</div>
        <div className="grade-badge" style={{background:gc+'22',color:gc,border:`1px solid ${gc}`}}>Grade {g} — {g==='A'?'Financial Expert!':g==='B'?'Smart Thinker':'Keep Learning'}</div>
        <div className="analysis">
          {[['Score',`${score}/${stage.scenes.length*10}`,'var(--accent-green)'],['Points',`⭐ ${score*5}`,'var(--accent-gold)'],['Stage',stage.emoji+' '+stage.id,'var(--text-primary)'],['IQ',pct>=85?'🧠 Excellent':pct>=65?'📈 Good':'📚 Developing','var(--text-primary)']].map(([l,v,c])=>(
            <div key={l} className="a-item"><div className="a-label">{l}</div><div className="a-val" style={{color:c}}>{v}</div></div>
          ))}
        </div>
        <div className="card" style={{textAlign:'left',marginBottom:'1.5rem'}}>
          <h3 style={{marginBottom:'.75rem'}}>📚 Related Topics</h3>
          {stage.topics.map(t=><span key={t} className="lesson-tag">{t}</span>)}
        </div>
        <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-g" onClick={()=>onComplete(score*5)}>🏆 Claim {score*5} Points</button>
          <button className="btn btn-s" onClick={()=>setStageIdx(null)}>← Stages</button>
          <button className="btn btn-s" onClick={onBack}>Back to Games</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{maxWidth:700,margin:'0 auto'}} className="fade">
      <div style={{display:'flex',gap:'.75rem',alignItems:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
        <button className="btn btn-s" onClick={()=>setStageIdx(null)}>← Stages</button>
        <span className="badge bp">{stage.title}</span>
      </div>
      <div className="game-hud">
        <div><div className="hud-v">{sceneIdx+1}/{stage.scenes.length}</div><div className="hud-l">Scene</div></div>
        <div><div className="hud-v" style={{color:'var(--accent-gold)'}}>{score}</div><div className="hud-l">Score</div></div>
        <div><div style={{fontSize:'2rem'}}>{stage.emoji}</div><div className="hud-l">Stage</div></div>
      </div>
      <div className="card" style={{marginBottom:'1rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginBottom:'1rem'}}>
          <div style={{fontSize:'2.5rem'}}>💭</div>
          <p style={{fontSize:'1.05rem',lineHeight:'1.5',color:'var(--text-primary)',fontWeight:500}}>{scene.q}</p>
        </div>
        {scene.opts.map((opt,i)=>{
          const letters=['A','B','C','D'];
          let cls='choice';
          if(answered){if(i===scene.correct)cls+=' correct';else if(i===selected)cls+=' wrong';}
          return <button key={i} className={cls} onClick={()=>answer(i)} disabled={answered}>
            <span className="cletter">{letters[i]}</span>{opt}
          </button>;
        })}
        {answered && <div className={`feedback ${selected!==scene.correct?'wrong':''}`}><strong>{selected===scene.correct?'✅ Smart choice!':'❌ Not optimal!'}</strong><br/>{scene.exp}</div>}
      </div>
      {answered && <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn btn-p" onClick={next}>{sceneIdx<stage.scenes.length-1?'Next Scene →':'🏁 See Results'}</button></div>}
    </div>
  );
};

const Games = ({ navigate }) => {
  const { addPoints, markComplete, userProfile } = useAuth();
  const [active, setActive] = useState(null);
  const [showToast, Toast] = useToast();
  const completed = userProfile?.completedGames||[];

  const handleComplete = async (pts, gameId) => {
    const id = gameId || active;
    await addPoints(pts);

    showToast(`🎉 You earned ${pts} points!`);

  };

  if(active==='budget') return <BudgetBuilder onComplete={p=>handleComplete(p,'budget')} onBack={()=>setActive(null)}/>;
  if(active==='quiz') return <FinanceQuiz onComplete={p=>handleComplete(p,'quiz')} onBack={()=>setActive(null)}/>;
  if(active==='invest') return <InvestmentSim onComplete={p=>handleComplete(p,'invest')} onBack={()=>setActive(null)}/>;
  if(active==='life') return <LifeSimulator onComplete={p=>handleComplete(p,'life')} onBack={()=>setActive(null)}/>;

  return (
    <div className="fade">
      <div style={{marginBottom:'2rem'}}><h2>🎮 Games</h2><p>Learn financial skills through interactive games. Earn points and improve your financial IQ!</p></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'1.25rem'}}>

            <div key={game.id} className="card" style={{cursor:'pointer',overflow:'hidden',padding:0,border:played?'1px solid var(--accent-green)':'1px solid var(--border)'}} onClick={()=>setActive(game.id)}>
              <div style={{height:140,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'4.5rem',background:`linear-gradient(135deg,${game.color}22,${game.color}08)`,position:'relative'}}>
                {game.icon}

              </div>
              <div style={{padding:'1.2rem'}}>
                <div style={{display:'flex',gap:'.5rem',marginBottom:'.5rem',flexWrap:'wrap'}}>
                  <span className={`badge ${game.diff==='Beginner'?'bg':game.diff==='Advanced'?'bb':game.diff==='Intermediate'?'bp':'bgo'}`}>{game.diff}</span>
                </div>
                <h3 style={{marginBottom:'.4rem'}}>{game.title}</h3>
                <p style={{fontSize:'.85rem',lineHeight:'1.6'}}>{game.desc}</p>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'1rem'}}>
                  <span style={{color:'var(--accent-gold)',fontSize:'.85rem',fontWeight:600}}>⭐ {game.pts}</span>
                  <button className="btn btn-p" style={{padding:'.5rem 1rem',fontSize:'.85rem'}}>{played?'▶ Replay':'▶ Play'}</button>

        })}

      <Toast/>

  );
};

const Shop = () => {
  const { userProfile, purchaseItem } = useAuth();
  const [cat, setCat] = useState('All');
  const [showToast, Toast] = useToast();
  const pts = userProfile?.points||0, owned = userProfile?.purchasedItems||[];

  const buy = async (item) => {
    if(owned.includes(item.id)){showToast('Already owned!');return;}
    if(pts<item.cost){showToast(`❌ Need ${item.cost-pts} more points.`);return;}
    const ok = await purchaseItem(item);
    if(ok) showToast(`✅ Purchased "${item.name}"!`);
  };

  const filtered = cat==='All' ? SHOP_ITEMS : SHOP_ITEMS.filter(i=>i.cat===cat);

  return (
    <div className="fade">
      <div style={{marginBottom:'2rem'}}><h2>🛒 Shop</h2><p>Spend your hard-earned points on exclusive items!</p></div>
      <div className="card" style={{display:'flex',alignItems:'center',gap:'1.5rem',marginBottom:'1.5rem',background:'linear-gradient(135deg,rgba(255,217,74,.1),rgba(255,170,0,.05))'}}>
        <div style={{fontSize:'3rem'}}>⭐</div>
        <div>
          <div style={{fontFamily:'var(--font-display)',fontSize:'2.2rem',fontWeight:800}} className="gold-text">{pts.toLocaleString()}</div>
          <div style={{fontSize:'.85rem',color:'var(--text-secondary)'}}>Points Available</div>
        </div>
        <div style={{marginLeft:'auto',textAlign:'right'}}>
          <div style={{fontWeight:700,color:'var(--accent-green)'}}>{owned.length} items owned</div>
          <div style={{fontSize:'.78rem',color:'var(--text-muted)'}}>Play games to earn more</div>
        </div>
      </div>
      <div style={{display:'flex',gap:'.5rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
        {['All','Sticker','Avatar','Badge'].map(c=>(
          <button key={c} className={`btn ${cat===c?'btn-p':'btn-s'}`} style={{padding:'.5rem 1.25rem',fontSize:'.85rem'}} onClick={()=>setCat(c)}>{c}</button>
        ))}
      </div>
      <div className="shop-grid">
        {filtered.map(item=>{
          const io = owned.includes(item.id), ca = pts>=item.cost;
          return (
            <div key={item.id} className={`shop-item ${io?'owned':''}`} onClick={()=>buy(item)} style={{opacity:!io&&!ca?.6:1}}>
              <div style={{fontSize:'3rem',marginBottom:'.75rem'}}>{item.icon}</div>
              <div style={{fontWeight:600,fontSize:'.9rem',marginBottom:'.2rem'}}>{item.name}</div>
              <div style={{fontSize:'.75rem',color:'var(--text-muted)',marginBottom:'.5rem'}}>{item.cat}</div>
              {io ? <div style={{color:'var(--accent-green)',fontWeight:700,fontSize:'.9rem'}}>✅ Owned</div>
                   : <div style={{color:ca?'var(--accent-gold)':'var(--accent-coral)',fontWeight:700,fontSize:'.9rem'}}>⭐ {item.cost} pts</div>}
            </div>
          );
        })}
      </div>
      <Toast/>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════════════
const MOCK_LB = [
  {displayName:'InvestorPro99',avatar:'🐉',points:4850,level:10},
  {displayName:'BudgetQueen',avatar:'👑',points:4210,level:9},
  {displayName:'WealthWizard',avatar:'🧘',points:3780,level:8},
  {displayName:'StockMaster',avatar:'🤖',points:3420,level:7},
  {displayName:'FrugalFox',avatar:'🦊',points:2900,level:6},
  {displayName:'PortfolioKing',avatar:'🦁',points:2500,level:6},
  {displayName:'SavingsStar',avatar:'🌟',points:2200,level:5},
  {displayName:'FinanceNerd42',avatar:'🐼',points:1950,level:5},
];
const MEDALS = {0:'🥇',1:'🥈',2:'🥉'};

const Leaderboard = () => {
  const { userProfile } = useAuth();
  const myEntry = {displayName:userProfile?.displayName||'You',avatar:userProfile?.avatar||'🦊',points:userProfile?.points||0,level:userProfile?.level||1,isMe:true};
  const all = [...MOCK_LB,myEntry].sort((a,b)=>b.points-a.points).slice(0,10);
  const myRank = all.findIndex(u=>u.isMe)+1;

  return (
    <div className="fade">
      <div style={{marginBottom:'2rem'}}><h2>🏆 Leaderboard</h2><p>Top FinQuest players ranked by points.</p></div>
      {myRank>0 && (
        <div className="card" style={{display:'flex',alignItems:'center',gap:'1.5rem',marginBottom:'1.5rem',background:'linear-gradient(135deg,rgba(0,229,160,.08),rgba(59,158,255,.08))'}}>
          <div style={{fontSize:'2.5rem'}}>{MEDALS[myRank-1]||`#${myRank}`}</div>
          <div>
            <div style={{fontWeight:700}}>Your Rank: <span className="gt">#{myRank}</span></div>
            <div style={{fontSize:'.85rem',color:'var(--text-secondary)'}}>{(userProfile?.points||0).toLocaleString()} points · Level {userProfile?.level||1}</div>
          </div>
          <div style={{marginLeft:'auto'}}><span className={`badge ${myRank<=3?'bgo':myRank<=10?'bb':'bg'}`}>{myRank<=3?'🌟 Top 3!':myRank<=10?'Top 10':'Keep climbing!'}</span></div>
        </div>
      )}
      <div>
        {all.map((u,i)=>(
          <div key={i} className={`leader-row ${u.isMe?'leader-self':''}`}>
            <div style={{fontFamily:'var(--font-display)',fontSize:'1.3rem',fontWeight:800,width:'2rem',textAlign:'center',color:i===0?'var(--accent-gold)':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--text-muted)'}}>
              {MEDALS[i]||i+1}
            </div>
            <div style={{fontSize:'1.8rem'}}>{u.avatar||'🦊'}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600}}>{u.displayName}{u.isMe&&<span className="badge bg" style={{marginLeft:'.5rem',fontSize:'.7rem'}}>You</span>}</div>
              <div style={{fontSize:'.78rem',color:'var(--text-muted)'}}>Level {u.level||1}</div>
            </div>
            <div style={{fontFamily:'var(--font-display)',fontWeight:800,color:'var(--accent-green)'}}>⭐ {(u.points||0).toLocaleString()}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════
const AppInner = () => {
  const { currentUser } = useAuth();
  const [page, setPage] = useState('landing');
  const nav = (to) => setPage(to);

  if(!currentUser){
    if(page==='login') return <Login navigate={nav}/>;
    if(page==='signup') return <Signup navigate={nav}/>;
    return <LandingPage navigate={nav}/>;
  }

  const render = () => {
    switch(page){
      case 'dashboard': return <Dashboard navigate={nav}/>;
      case 'profile':   return <Profile navigate={nav}/>;
      case 'lessons':   return <Lessons navigate={nav}/>;
      case 'games':     return <Games navigate={nav}/>;
      case 'shop':      return <Shop navigate={nav}/>;
      case 'leaderboard': return <Leaderboard navigate={nav}/>;
      default:          return <Dashboard navigate={nav}/>;
    }
  };

  return (
    <div className="app">
      <Navbar page={page} navigate={nav}/>
      <main className="main fade">{render()}</main>
    </div>
  );
};

const App = () => (
  <AuthProvider>
    <AppInner/>
  </AuthProvider>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
